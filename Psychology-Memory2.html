<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - Psychology: Memory</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>Psychology: Memory</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-psychology-memory-iphone.html";

        const flashcards = [
            {
                question: "What is memory?",
                answer: "Memory is the cognitive process of encoding, storing, and retrieving information. It involves retaining experiences and knowledge over time to influence future behaviour and thoughts."
            },
            {
                question: "Define encoding in the context of memory.",
                answer: "Encoding is the process of converting sensory information into a form that can be stored in memory. This can occur through visual, acoustic, or semantic pathways depending on how attention is focused."
            },
            {
                question: "What are the three stages of the Atkinson-Shiffrin model?",
                answer: "The three stages are sensory register (receives sensory information), short-term memory or working memory (limited capacity and duration), and long-term memory (large capacity, potentially unlimited duration). Atkinson and Shiffrin developed this model through laboratory memory experiments and mathematical modelling in 1968."
            },
            {
                question: "What is the capacity of short-term memory according to Miller?",
                answer: "Miller proposed that short-term memory has a capacity of approximately 7 plus or minus 2 items (5-9 items). This is often called the magic number. Miller established this through memory span experiments where participants recalled sequences of items."
            },
            {
                question: "What is chunking and why is it effective?",
                answer: "Chunking is the grouping of individual pieces of information into larger, meaningful units. It is effective because it increases the amount of information that can be held in short-term memory by organizing items into familiar patterns or concepts."
            },
            {
                question: "Define decay theory of forgetting.",
                answer: "Decay theory suggests that memories fade over time due to physiological changes in the nervous system. The memory trace becomes progressively weaker unless it is rehearsed or reviewed, eventually disappearing completely."
            },
            {
                question: "What is interference theory and what are its two types?",
                answer: "Interference theory proposes that forgetting occurs because similar memories compete and confuse each other. Proactive interference is when old memories interfere with learning new information; retroactive interference is when new memories interfere with recall of old information."
            },
            {
                question: "Describe the Baddeley and Hitch model of working memory.",
                answer: "The Baddeley and Hitch model proposes that working memory has three main components: the central executive (controls attention and coordinates processing), the phonological loop (processes verbal and acoustic information), and the visuospatial sketchpad (handles visual and spatial information). This model was developed through laboratory studies and case studies of brain-damaged patients."
            },
            {
                question: "What is the capacity and duration of the phonological loop?",
                answer: "The phonological loop has a capacity of about 2-3 seconds of spoken speech (typically 5-9 items) and a limited duration. Information is held and repeated through sub-vocal rehearsal, and can be forgotten due to decay or interference."
            },
            {
                question: "What is episodic memory?",
                answer: "Episodic memory is long-term memory for events and experiences tied to a specific time and place. It involves recollection of personal experiences and the context in which they occurred, such as memories of a holiday or an important life event."
            },
            {
                question: "Define semantic memory.",
                answer: "Semantic memory is long-term memory for facts, knowledge, concepts, and meanings that are independent of the context in which they were learned. Examples include knowing capital cities, mathematical formulas, or general knowledge about the world."
            },
            {
                question: "What is procedural memory and give two examples.",
                answer: "Procedural memory is long-term memory for skills, abilities, and how to perform tasks. Examples include riding a bicycle, typing on a keyboard, playing a musical instrument, or driving a car. This memory is often implicit and difficult to verbalize."
            },
            {
                question: "Describe the case study of patient H.M. and its significance.",
                answer: "Patient H.M. had his hippocampus removed to treat epilepsy, resulting in severe anterograde amnesia (inability to form new long-term memories). However, he retained procedural memory and short-term memory, and could still learn motor skills. This case demonstrated the role of the hippocampus in memory consolidation and the dissociation between different memory types. This observation was documented through detailed neuropsychological testing by Brenda Milner."
            },
            {
                question: "What is the primacy effect?",
                answer: "The primacy effect is the tendency to better remember information presented at the beginning of a list or sequence. This occurs because early items receive more rehearsal and are more likely to enter long-term memory."
            },
            {
                question: "Define the recency effect.",
                answer: "The recency effect is the tendency to better remember information presented at the end of a list or sequence. This occurs because recent items remain in short-term memory and have not yet faded or been displaced by other information."
            },
            {
                question: "Describe the serial position effect and how it supports the Atkinson-Shiffrin model.",
                answer: "The serial position effect is the better recall of items at the beginning (primacy effect) and end (recency effect) of a list compared to the middle. This supports Atkinson-Shiffrin by suggesting that early items transfer to long-term memory (primacy) while late items remain in short-term memory (recency)."
            },
            {
                question: "What is the levels of processing framework proposed by Craik and Lockhart?",
                answer: "The levels of processing framework proposes that memory depends on the depth of processing rather than rehearsal type. Shallow processing (visual or phonetic analysis) results in weak memory traces, while deep processing (semantic analysis) results in stronger memory traces that are more retrievable. This theory was developed through laboratory experiments on word recognition and recall."
            },
            {
                question: "What is elaborative rehearsal and why is it more effective than maintenance rehearsal?",
                answer: "Elaborative rehearsal involves connecting new information to existing knowledge and understanding its meaning. It is more effective than maintenance rehearsal (simple repetition) because it creates stronger memory traces through semantic processing and provides more retrieval cues for later recall."
            },
            {
                question: "Define retrieval failure theory and its role in forgetting.",
                answer: "Retrieval failure theory suggests that forgetting occurs because the retrieval cues available at recall are insufficient to access stored memories. The information is not actually lost but cannot be accessed without the right cues, such as context or associations."
            },
            {
                question: "What is context-dependent memory?",
                answer: "Context-dependent memory refers to improved recall when the retrieval context (environment, surroundings) matches the encoding context. For example, recalling information in the same room where it was learned often improves memory performance due to the presence of environmental cues."
            },
            {
                question: "Define state-dependent memory.",
                answer: "State-dependent memory refers to improved recall when the individual's internal state (physical or psychological condition) during retrieval matches the state during encoding. For example, information learned while in a particular mood may be easier to recall when in a similar mood."
            },
            {
                question: "Describe Bartlett's theory of reconstructive memory.",
                answer: "Bartlett proposed that memory is reconstructive rather than reproductive, meaning people do not simply retrieve stored memories but actively reconstruct them based on schemas (mental frameworks) and current knowledge. This process can introduce distortions and errors. Bartlett demonstrated this through the War of the Ghosts study, where participants recalled a story inaccurately by imposing their own cultural schemas."
            },
            {
                question: "What are schemas and how do they affect memory?",
                answer: "Schemas are organized mental frameworks or structured knowledge about concepts, situations, or events. They influence memory by guiding encoding, shaping interpretation of new information, and facilitating retrieval through related concepts. However, schemas can also cause distortions and false memories through assimilation of information that fits the schema."
            },
            {
                question: "What is the misinformation effect?",
                answer: "The misinformation effect is the impairment of memory for witnessed events when exposed to false or misleading information about those events after they occur. This can lead to the incorporation of false details into the memory, distorting the original memory trace."
            },
            {
                question: "Describe false memories and the Loftus and Pickrell study.",
                answer: "False memories are detailed recollections of events that did not actually occur. Loftus and Pickrell (1995) demonstrated this in the lost-in-the-mall study, where about 25% of participants falsely remembered being lost in a mall as a child when the experimenter suggested this through guided imagery and family member confirmation. This showed that false memories can be implanted and feel as real as genuine memories."
            },
            {
                question: "What is eyewitness testimony and why is it unreliable?",
                answer: "Eyewitness testimony is an account of an event based on personal observation. It is unreliable because of factors such as stress during the event, poor lighting conditions, misinformation exposure, suggestion by questioners, false memories, and reconstructive processes that distort the original memory."
            },
            {
                question: "Describe cognitive interview techniques and their purpose.",
                answer: "Cognitive interview techniques are methods designed to improve the accuracy of eyewitness recall. They include asking witnesses to mentally reinstate the context, reporting every detail without filtering, recalling events in different order, and adopting different perspectives. These techniques increase retrieval cues and reduce suggestibility compared to standard police interviews."
            },
            {
                question: "What is the multi-store model's main criticism?",
                answer: "The main criticisms of the Atkinson-Shiffrin multi-store model are that it oversimplifies memory as a linear process, it does not adequately account for the active manipulation of information in working memory, it fails to explain individual differences in memory capacity and strategies, and it does not fully explain the role of retrieval cues and context in memory performance."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
