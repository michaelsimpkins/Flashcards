<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - English Language: Semantics</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>English Language: Semantics</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-english-language-semantics-iphone.html";

        const flashcards = [
            {
                question: "What is semantics?",
                answer: "Semantics is the study of meaning in language. It examines how words, phrases and sentences convey meaning and how meaning is understood by speakers and listeners."
            },
            {
                question: "Define denotation.",
                answer: "Denotation is the literal, dictionary definition of a word. It is the concrete, objective meaning that most people agree on. For example, the denotation of 'rose' is a type of flowering plant."
            },
            {
                question: "Define connotation.",
                answer: "Connotation refers to the emotional, cultural, or personal associations and implications a word carries beyond its literal meaning. For example, 'rose' can connote romance, love, or beauty."
            },
            {
                question: "What is a semantic field?",
                answer: "A semantic field is a group of related words that share a common theme or meaning. Words within the same semantic field are connected conceptually. For example, 'red', 'crimson', 'scarlet' and 'burgundy' all belong to the semantic field of colours."
            },
            {
                question: "What is hyponymy in semantics?",
                answer: "Hyponymy is a relationship where one word has a more specific meaning within the broader meaning of another word. For example, 'dog' is a hyponym of 'animal' because a dog is a specific type of animal."
            },
            {
                question: "What is a hypernym?",
                answer: "A hypernym is a word with a broader meaning that encompasses more specific words. It is the opposite of a hyponym. For example, 'vehicle' is a hypernym of 'car' because it is more general and inclusive."
            },
            {
                question: "Define synonymy.",
                answer: "Synonymy is when two or more words have very similar or nearly identical meanings. Examples include 'happy' and 'cheerful', or 'big' and 'large'. Perfect synonymy is rare in language."
            },
            {
                question: "What is antonymy?",
                answer: "Antonymy is the semantic relationship between opposite words. There are gradable antonyms (hot/cold) and complementary antonyms (alive/dead) where no middle ground exists."
            },
            {
                question: "What is homonymy?",
                answer: "Homonymy occurs when a single word has two or more completely unrelated meanings. For example, 'bark' can mean the sound a dog makes or the outer layer of a tree. These meanings have different origins."
            },
            {
                question: "Distinguish between homophones and homographs.",
                answer: "Homophones are words that sound identical but have different meanings and spellings, like 'son' and 'sun'. Homographs are words spelled identically but with different meanings and sometimes different pronunciations, like 'read' (present) and 'read' (past)."
            },
            {
                question: "What is polysemy?",
                answer: "Polysemy is when one word has multiple related meanings that share a common origin. For example, 'bank' can mean a financial institution or the edge of a river. These meanings are semantically connected."
            },
            {
                question: "What is semantic change?",
                answer: "Semantic change is the gradual shift in the meaning of a word over time. It can involve broadening (expansion), narrowing (restriction), amelioration (positive shift), or pejoration (negative shift)."
            },
            {
                question: "Give an example of semantic broadening.",
                answer: "Semantic broadening occurs when a word's meaning expands. For example, 'keep' originally meant 'to tend cattle' but now has a much broader meaning including 'to retain' or 'to maintain'."
            },
            {
                question: "Give an example of semantic narrowing.",
                answer: "Semantic narrowing occurs when a word's meaning becomes more restricted. For example, 'meat' once meant any food but now typically refers only to animal flesh."
            },
            {
                question: "What is amelioration?",
                answer: "Amelioration is a type of semantic change where a word gains a more positive or favourable meaning over time. For example, 'nice' originally meant 'foolish' but now means 'pleasant' or 'good'."
            },
            {
                question: "What is pejoration?",
                answer: "Pejoration is a type of semantic change where a word gains a more negative or unfavourable meaning over time. For example, 'silly' originally meant 'blessed' or 'innocent' but now means 'foolish'."
            },
            {
                question: "What is metaphor in semantics?",
                answer: "Metaphor is a figure of speech where a word or phrase is used in a non-literal way to describe something by comparison. For example, 'time is money' uses financial language to conceptualize time."
            },
            {
                question: "What is metonymy in semantics?",
                answer: "Metonymy is when a word referring to one thing is used to refer to something associated with it. For example, 'the Crown' can refer to the monarch or the government, not the physical crown."
            },
            {
                question: "What is hyperbole?",
                answer: "Hyperbole is a form of semantic exaggeration used for emphasis or effect. For example, 'I've told you a million times' uses extreme exaggeration to convey frustration, not a literal count."
            },
            {
                question: "What is understatement or meiosis?",
                answer: "Understatement or meiosis is when something is deliberately represented as less important or less serious than it actually is. For example, 'that's not bad' meaning 'that's good', or 'it's a bit chilly' for very cold weather."
            },
            {
                question: "What is irony in semantics?",
                answer: "Irony occurs when there is a contradiction between literal meaning and intended meaning. Verbal irony says the opposite of what is meant. For example, 'Oh great, another exam' said sarcastically when you are unhappy about it."
            },
            {
                question: "Define lexical ambiguity.",
                answer: "Lexical ambiguity arises when a single word has multiple meanings, causing uncertainty about which meaning is intended. For example, 'bank' can mean a financial institution or the side of a river."
            },
            {
                question: "Define structural ambiguity.",
                answer: "Structural ambiguity occurs when the grammatical structure of a sentence allows multiple interpretations. For example, 'visiting relatives can be boring' could mean either visiting relatives is boring or when relatives visit, it can be boring."
            },
            {
                question: "What is a prototype?",
                answer: "In semantics, a prototype is the most typical or central member of a category. For example, a robin is considered a better prototype of 'bird' than a penguin because it displays typical bird characteristics like flying."
            },
            {
                question: "What is semantic marking?",
                answer: "Semantic marking occurs when one word in a pair is marked (unusual or specialized) and the other is unmarked (neutral or general). For example, 'man' can be unmarked (all humans) or 'woman' is marked (female humans)."
            },
            {
                question: "What is collocation in semantics?",
                answer: "Collocation refers to words that frequently appear together and become associated with each other. For example, 'strong tea' and 'weak tea' collocate these adjectives with 'tea', even though 'weak' might seem unusual."
            },
            {
                question: "How does context affect semantic interpretation?",
                answer: "Context provides information that helps clarify meaning and resolve ambiguity. The same word can have different meanings in different contexts. For example, 'bank' means something different at a financial institution versus by a river."
            },
            {
                question: "What is the relationship between semantics and pragmatics?",
                answer: "Semantics focuses on the literal meaning of words and sentences, while pragmatics examines how context and speaker intent affect meaning. Pragmatics asks 'what does the speaker mean?' beyond the semantic content."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
