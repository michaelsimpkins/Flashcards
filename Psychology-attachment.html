<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - Psychology: Attachment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>Psychology: Attachment</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-psychology-attachment-iphone.html";

        const flashcards = [
            {
                question: "What is attachment?",
                answer: "Attachment is a strong, lasting emotional bond between two people, usually an infant and caregiver, characterised by proximity seeking and distress on separation."
            },
            {
                question: "What is reciprocity in caregiver-infant interaction?",
                answer: "Reciprocity is a two-way interaction where infant and caregiver respond to each other's signals, such as smiling, vocalising and taking turns."
            },
            {
                question: "What is interactional synchrony?",
                answer: "Interactional synchrony is when infant and caregiver mirror or coordinate their actions and emotions, often appearing to move in rhythm with each other."
            },
            {
                question: "What did Meltzoff and Moore find about infant interaction?",
                answer: "They found that infants as young as a few weeks old imitated adult facial expressions and hand movements, supporting the idea of early interactional synchrony."
            },
            {
                question: "Give one limitation of research into caregiver-infant interactions.",
                answer: "It is difficult to know the infant's intention, so behaviours like imitation may be automatic rather than meaningful social communication."
            },
            {
                question: "What are Schaffer and Emerson's four stages of attachment?",
                answer: "The stages are asocial stage, indiscriminate attachment, specific attachment, and multiple attachments."
            },
            {
                question: "What happens during the asocial stage?",
                answer: "From about 0 to 6 weeks, infants show similar responses to humans and objects, but usually prefer human-like stimuli such as faces and voices."
            },
            {
                question: "What happens during indiscriminate attachment?",
                answer: "From around 6 weeks to 7 months, infants enjoy human company and accept comfort from any adult, but do not yet show strong stranger anxiety."
            },
            {
                question: "What happens during specific attachment?",
                answer: "From about 7 months, infants show a primary attachment to one caregiver and display separation anxiety and stranger anxiety."
            },
            {
                question: "What are multiple attachments?",
                answer: "From about 10 months, infants form attachments with several people, such as fathers, grandparents and siblings, as well as the primary caregiver."
            },
            {
                question: "What did Schaffer and Emerson find about primary attachments?",
                answer: "They found that many infants formed primary attachments with the person who showed the most sensitive responsiveness, not necessarily the person who fed them."
            },
            {
                question: "What was Lorenz's study of imprinting?",
                answer: "Lorenz split goose eggs so half hatched with their mother and half with him. Goslings followed the first moving object they saw, showing imprinting."
            },
            {
                question: "What is imprinting?",
                answer: "Imprinting is a rapid form of attachment in some animals, where offspring attach to the first moving object they encounter during a critical period."
            },
            {
                question: "What is one limitation of applying Lorenz's findings to humans?",
                answer: "Geese are very different from humans, so imprinting in birds may not explain complex human emotional attachments."
            },
            {
                question: "What was Harlow's monkey study?",
                answer: "Harlow raised infant monkeys with a wire mother that provided food and a soft cloth mother. The monkeys preferred the cloth mother for comfort."
            },
            {
                question: "What did Harlow's study suggest about attachment?",
                answer: "It suggested that contact comfort is more important than food in forming attachments, challenging the learning theory explanation."
            },
            {
                question: "Give one ethical issue with Harlow's research.",
                answer: "The monkeys experienced severe distress and long-term social and emotional harm, raising serious concerns about animal welfare."
            },
            {
                question: "What is the learning theory explanation of attachment?",
                answer: "Learning theory argues attachment is learned through classical conditioning and operant conditioning, with the caregiver associated with food and pleasure."
            },
            {
                question: "How does classical conditioning explain attachment?",
                answer: "Food is an unconditioned stimulus producing pleasure. The caregiver becomes associated with food and becomes a conditioned stimulus producing pleasure."
            },
            {
                question: "How does operant conditioning explain attachment?",
                answer: "Crying brings food and comfort, which negatively reinforces crying. The caregiver is reinforced because feeding stops the crying."
            },
            {
                question: "What is one criticism of learning theory?",
                answer: "It overemphasises food. Evidence from Harlow and Schaffer and Emerson suggests comfort and sensitive responsiveness are more important than feeding."
            },
            {
                question: "What is Bowlby's monotropic theory?",
                answer: "Bowlby proposed that infants have an innate tendency to form one special attachment, usually with the mother, which has unique emotional importance."
            },
            {
                question: "What is Bowlby's concept of a critical period?",
                answer: "Bowlby argued attachment must form within a biologically determined period, usually around the first two years, or later development may be harmed."
            },
            {
                question: "What is the internal working model?",
                answer: "The internal working model is a mental template based on the first attachment, shaping expectations about future relationships and the self."
            },
            {
                question: "What is social releaser behaviour?",
                answer: "Social releasers are infant behaviours, such as smiling and crying, that trigger caregiving responses and help attachments form."
            },
            {
                question: "What was Ainsworth's Strange Situation?",
                answer: "It was a controlled observation assessing infant attachment using separations and reunions with the caregiver, plus exposure to a stranger."
            },
            {
                question: "What behaviours are measured in the Strange Situation?",
                answer: "Key behaviours include proximity seeking, exploration, stranger anxiety, separation anxiety and reunion behaviour."
            },
            {
                question: "Describe secure attachment.",
                answer: "Securely attached infants explore happily, show moderate separation and stranger anxiety, and are easily comforted by the caregiver on reunion."
            },
            {
                question: "Describe insecure-avoidant attachment.",
                answer: "Insecure-avoidant infants show low separation and stranger anxiety, avoid contact with the caregiver, and show little reaction at reunion."
            },
            {
                question: "Describe insecure-resistant attachment.",
                answer: "Insecure-resistant infants show high separation and stranger anxiety, explore less, and both seek and resist comfort at reunion."
            },
            {
                question: "What did Ainsworth find about attachment types?",
                answer: "Ainsworth found secure attachment was most common, followed by insecure-avoidant, with insecure-resistant being least common in her American sample."
            },
            {
                question: "Give one strength of the Strange Situation.",
                answer: "It has good reliability because it uses a standardised procedure and clear behavioural categories, allowing observers to reach similar conclusions."
            },
            {
                question: "Give one limitation of the Strange Situation.",
                answer: "It may be culture-bound because it was developed in the USA and may not measure attachment accurately in cultures with different childcare practices."
            },
            {
                question: "What did Van IJzendoorn and Kroonenberg find about cultural variations?",
                answer: "They found secure attachment was the most common type across cultures, but there was variation, such as higher avoidant attachment in Germany and higher resistant attachment in Japan."
            },
            {
                question: "What is Bowlby's maternal deprivation hypothesis?",
                answer: "Bowlby argued that prolonged separation from the mother during the critical period could cause long-term emotional, intellectual and social difficulties."
            },
            {
                question: "What did Bowlby's 44 thieves study find?",
                answer: "Bowlby found many affectionless thieves had experienced early prolonged separation from their mothers, supporting a link between deprivation and later problems."
            },
            {
                question: "Give one limitation of Bowlby's 44 thieves study.",
                answer: "It was correlational and retrospective, so it cannot prove that maternal deprivation directly caused later affectionless psychopathy."
            },
            {
                question: "What is institutionalisation?",
                answer: "Institutionalisation refers to the effects of living in an institution, such as an orphanage, where children may receive limited emotional care."
            },
            {
                question: "What did Rutter's Romanian orphan study find?",
                answer: "Rutter found that children adopted before 6 months often recovered well, while later-adopted children were more likely to show cognitive and social difficulties."
            },
            {
                question: "What effects of institutionalisation were found in Romanian orphan studies?",
                answer: "Effects included delayed intellectual development, disinhibited attachment, poor peer relationships and, in some cases, long-term social difficulties."
            },
            {
                question: "What is disinhibited attachment?",
                answer: "Disinhibited attachment is overly friendly behaviour towards unfamiliar adults, often linked to having many caregivers and no consistent attachment figure."
            },
            {
                question: "How can early attachment influence later relationships?",
                answer: "Through the internal working model, early attachment may affect friendships, romantic relationships, parenting style and expectations of trust and intimacy."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
