<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - English Language: Language Diversity</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>English Language: Language Diversity</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-english-language-diversity-iphone.html";

        const flashcards = [
            {
                question: "What is language diversity?",
                answer: "Language diversity refers to the existence of different varieties and styles of language within a community, including regional dialects, social dialects, idiolects, and registers. It encompasses the linguistic differences between speakers due to geography, social class, gender, age, and context."
            },
            {
                question: "Define a dialect.",
                answer: "A dialect is a variety of language distinguished by grammar, vocabulary, and phonology that is associated with a particular region or social group. Dialects are systematic and rule-governed, and every speaker has a dialect."
            },
            {
                question: "What is an idiolect?",
                answer: "An idiolect is an individual's unique way of speaking, including their personal vocabulary choices, pronunciation patterns, and grammatical preferences. It reflects their age, background, personality, and experiences."
            },
            {
                question: "What is a sociolect?",
                answer: "A sociolect is a variety of language associated with a particular social group or social class. It reflects differences based on factors like occupation, education, socioeconomic status, and social identity rather than geography."
            },
            {
                question: "Define register.",
                answer: "A register is a variety of language used in specific contexts or situations. It varies according to formality, purpose, and audience. Examples include academic register, legal register, and informal conversational register."
            },
            {
                question: "What is a sociolinguistic variable?",
                answer: "A sociolinguistic variable is a linguistic feature that varies systematically based on social factors such as class, gender, age, or ethnicity. Speakers may use different variants of the same variable depending on social context."
            },
            {
                question: "What did William Labov demonstrate in his research?",
                answer: "William Labov demonstrated through his studies, particularly the New York City department store study and Martha's Vineyard investigation, that language variation is systematic and correlates with social variables like class, gender, and age, establishing sociolinguistics as an empirical science."
            },
            {
                question: "What is code-switching?",
                answer: "Code-switching is the practice of alternating between two or more varieties of language within a single conversation or utterance. It can occur between different languages, dialects, or registers and is a normal feature of multilingual and multidialectal communities."
            },
            {
                question: "Define accent.",
                answer: "An accent refers to the pronunciation features of a speaker's language variety. It specifically relates to phonological differences, whereas dialect encompasses phonology, grammar, and vocabulary."
            },
            {
                question: "What is phonological variation?",
                answer: "Phonological variation refers to differences in the sounds used in different language varieties. Examples include the pronunciation of 'th' sounds, vowel shifts, and stress patterns that vary by region, social class, or context."
            },
            {
                question: "What is lexical variation?",
                answer: "Lexical variation refers to differences in vocabulary choice across language varieties. Different regions or social groups may use different words for the same concept (e.g., 'soft drink' vs. 'pop' vs. 'coke')."
            },
            {
                question: "What is grammatical variation?",
                answer: "Grammatical variation refers to differences in grammar and syntax across language varieties. Examples include using 'ain't' instead of 'isn't', or using double negatives, which vary by dialect or register."
            },
            {
                question: "What is prestige?",
                answer: "In sociolinguistics, prestige refers to the social status or value associated with a particular language variety. Standard English typically has high prestige, while non-standard varieties may have lower prestige in formal contexts, though this varies by community."
            },
            {
                question: "What is the standard variety?",
                answer: "The standard variety is the form of language considered to be correct and prestigious by a society. It is typically used in formal contexts, education, and media, and is often associated with particular social groups."
            },
            {
                question: "Define linguistic capital.",
                answer: "Linguistic capital refers to the advantages gained by using prestigious language varieties. Speakers with higher linguistic capital may have more opportunities in education and employment due to their command of standard or prestigious forms."
            },
            {
                question: "What is the difference between regional and social dialects?",
                answer: "Regional dialects vary geographically across areas (e.g., Scottish vs. Southern English), while social dialects vary by social factors like class, education, or occupation. A speaker may use both regional and social features simultaneously."
            },
            {
                question: "What is covert prestige?",
                answer: "Covert prestige refers to the social value given to non-standard forms within certain communities. Although stigmatized in formal settings, certain dialects or features may be valued for identity, solidarity, or authenticity within their own communities."
            },
            {
                question: "What does the term 'bidialectal' mean?",
                answer: "Bidialectal refers to a speaker's ability to use two dialects fluently, typically a standard variety and a regional or social dialect. Many speakers are effectively bidialectal, switching between varieties depending on context."
            },
            {
                question: "What is language change?",
                answer: "Language change refers to the process by which language varieties evolve over time. This includes changes in pronunciation, grammar, vocabulary, and meaning that can occur across generations and often correlate with social factors."
            },
            {
                question: "What are semantic changes?",
                answer: "Semantic changes refer to shifts in the meaning of words over time. Examples include 'gay' changing from meaning 'happy' to referring to sexual orientation, or 'tweet' becoming associated with social media rather than bird sounds."
            },
            {
                question: "What is grammaticalization?",
                answer: "Grammaticalization is the process by which lexical words gradually become grammatical words. For example, 'going to' (movement + destination) has grammaticalized into the future marker 'gonna' in many varieties of English."
            },
            {
                question: "What does 'language variation' include?",
                answer: "Language variation includes systematic differences in how people use language based on geography (dialect), social group (sociolect), situation (register), individual style (idiolect), and context. Variation is normal and rule-governed, not random."
            },
            {
                question: "What is the relationship between language and identity?",
                answer: "Language varieties are closely tied to identity. The variety someone uses reflects and constructs their regional origin, social class, ethnicity, gender, and group membership. Language choices can signal belonging to or distance from particular communities."
            },
            {
                question: "What are stereotypes about language varieties?",
                answer: "Stereotypes about language varieties involve generalizations and often negative judgments about speakers of non-standard forms. These stereotypes can include assumptions about intelligence, education, or trustworthiness based solely on language use, though these are not supported by linguistic evidence."
            },
            {
                question: "What is linguistic insecurity?",
                answer: "Linguistic insecurity refers to speakers' anxiety or lack of confidence about their own language use when it differs from the standard variety. This is often caused by social attitudes that stigmatize non-standard forms, leading speakers to feel their speech is inferior or incorrect."
            },
            {
                question: "How does gender relate to language diversity?",
                answer: "Gender is a significant sociolinguistic variable. Research shows differences in speech patterns between genders, including different rates of using standard forms, different interaction styles, and different patterns of language change adoption."
            },
            {
                question: "What is the 'observer's paradox'?",
                answer: "The observer's paradox is a challenge in sociolinguistic research where the act of observing and recording language use can change the behavior being studied. Speakers may use more formal language when they know they are being recorded or studied."
            },
            {
                question: "Why is studying language diversity important?",
                answer: "Studying language diversity is important because it reveals how language is used in real communities, challenges myths about 'correct' language, informs language teaching and policy, helps explain language change, and illuminates the relationship between language, society, and identity."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
