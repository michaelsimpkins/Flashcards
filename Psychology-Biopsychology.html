<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - Psychology: Biopsychology</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>Psychology: Biopsychology</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-psychology-biopsychology-iphone.html";

        const flashcards = [
            {
                question: "What is biopsychology?",
                answer: "Biopsychology is the study of the biological bases of behaviour and mental processes, including the nervous system, brain, and biological factors that influence psychological functioning."
            },
            {
                question: "Name the three main divisions of the nervous system.",
                answer: "Central nervous system (CNS), peripheral nervous system (PNS), and the autonomic nervous system is a subdivision of the PNS."
            },
            {
                question: "What is the central nervous system (CNS)?",
                answer: "The CNS consists of the brain and spinal cord. It processes information and coordinates responses to stimuli."
            },
            {
                question: "What is the peripheral nervous system (PNS)?",
                answer: "The PNS consists of all neural tissue outside the CNS. It connects the brain and spinal cord to the rest of the body and is divided into somatic and autonomic nervous systems."
            },
            {
                question: "What does the somatic nervous system do?",
                answer: "The somatic nervous system controls voluntary skeletal muscles and transmits sensory information from skin, muscles and joints to the CNS."
            },
            {
                question: "What does the autonomic nervous system do?",
                answer: "The autonomic nervous system controls involuntary functions of the body including heart rate, digestion, and gland secretion. It has two subdivisions: sympathetic and parasympathetic."
            },
            {
                question: "What is the sympathetic nervous system?",
                answer: "The sympathetic nervous system is activated during stress or arousal. It increases heart rate, dilates pupils, and prepares the body for fight-or-flight responses."
            },
            {
                question: "What is the parasympathetic nervous system?",
                answer: "The parasympathetic nervous system promotes rest and relaxation. It decreases heart rate, increases digestion, and promotes conservation of energy."
            },
            {
                question: "What is a neuron?",
                answer: "A neuron is the functional unit of the nervous system. It consists of a cell body (soma), dendrites, and an axon, and transmits information via electrical and chemical signals."
            },
            {
                question: "What are the three types of neurons?",
                answer: "Sensory neurons (afferent) carry signals from receptors to the CNS; motor neurons (efferent) carry signals from the CNS to muscles; interneurons connect sensory and motor neurons within the CNS."
            },
            {
                question: "What is an action potential?",
                answer: "An action potential is a rapid change in electrical potential across a cell membrane. It involves depolarisation followed by repolarisation, allowing neurons to transmit signals over long distances."
            },
            {
                question: "What is synaptic transmission?",
                answer: "Synaptic transmission is the process by which neurotransmitters released from a presynaptic neuron cross the synaptic cleft and bind to receptors on a postsynaptic neuron, transmitting signals between neurons."
            },
            {
                question: "What are neurotransmitters?",
                answer: "Neurotransmitters are chemical messengers released from the presynaptic neuron that cross the synapse and bind to receptors on the postsynaptic neuron to transmit signals. Examples include dopamine, serotonin, and acetylcholine."
            },
            {
                question: "What is the role of dopamine?",
                answer: "Dopamine is involved in motor control, motivation, reward processing, and mood. Dysfunction in dopamine pathways is associated with Parkinson's disease, schizophrenia, and addiction."
            },
            {
                question: "What is the role of serotonin?",
                answer: "Serotonin regulates mood, sleep, appetite, and sexual function. Low serotonin is associated with depression and anxiety, and SSRIs work by increasing serotonin levels."
            },
            {
                question: "What is the role of acetylcholine?",
                answer: "Acetylcholine is involved in muscle contraction, learning, memory, and attention. It is depleted in Alzheimer's disease, affecting cognitive function."
            },
            {
                question: "What are the main structures of the brain?",
                answer: "The brain consists of the cerebrum (largest part, divided into hemispheres and lobes), cerebellum (coordinates movement and balance), and brainstem (regulates vital functions like breathing and heart rate)."
            },
            {
                question: "What are the four lobes of the cerebral cortex?",
                answer: "Frontal lobe (executive function, motor control), parietal lobe (sensory processing), temporal lobe (memory, hearing), and occipital lobe (vision)."
            },
            {
                question: "What is the function of the hippocampus?",
                answer: "The hippocampus is crucial for forming and consolidating new memories, particularly episodic and declarative memories. Damage results in severe memory deficits."
            },
            {
                question: "What is the function of the amygdala?",
                answer: "The amygdala processes emotions, especially fear and threat detection. It plays a key role in emotional learning and the formation of emotional memories."
            },
            {
                question: "What does the cerebellum do?",
                answer: "The cerebellum coordinates voluntary movement, maintains balance, and controls motor timing. It processes sensory input to refine motor output."
            },
            {
                question: "What is neuroplasticity?",
                answer: "Neuroplasticity is the brain's ability to reorganise and form new neural connections throughout life in response to experience, learning, and injury."
            },
            {
                question: "What is lateralisation of function?",
                answer: "Lateralisation refers to the specialisation of the left and right cerebral hemispheres for different functions. The left hemisphere typically specialises in language and logic; the right in spatial and creative abilities."
            },
            {
                question: "What is the endocrine system?",
                answer: "The endocrine system consists of glands that secrete hormones into the bloodstream to regulate body functions. Key glands include the pituitary, thyroid, adrenal glands, and pancreas."
            },
            {
                question: "What is the role of the hypothalamus?",
                answer: "The hypothalamus regulates homeostasis, controls the pituitary gland, and influences behaviour related to hunger, thirst, temperature regulation, and sleep-wake cycles."
            },
            {
                question: "What does the pituitary gland do?",
                answer: "The pituitary gland is the 'master gland' that secretes hormones controlling growth, reproduction, metabolism, and stress responses. It has anterior and posterior lobes with different functions."
            },
            {
                question: "What is the role of cortisol?",
                answer: "Cortisol is a stress hormone released by the adrenal cortex during the stress response. It increases blood glucose and suppresses immune function to prepare the body for action."
            },
            {
                question: "What are the strengths of the biopsychological approach?",
                answer: "Strengths include: scientific methods and objectivity; can explain biological basis of behaviour; has led to effective treatments (drugs, surgery); recognises importance of genetics and evolution."
            },
            {
                question: "What are the limitations of the biopsychological approach?",
                answer: "Limitations include: reductionism (oversimplifies complex behaviour); ignores social and cultural factors; cannot explain subjective experiences; correlation vs causation issues; ethical concerns with brain research."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
