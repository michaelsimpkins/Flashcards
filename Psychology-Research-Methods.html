<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Level Revision Flashcards - Psychology: Research Methods</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-padding);
        }

        body.format-laptop {
            --container-max-width: 800px;
            --body-padding: 20px;
            --card-height: 400px;
            --card-padding: 40px;
            --front-font-size: 1.5em;
            --back-font-size: 1.3em;
            --header-title-size: 2.5em;
            --header-margin-bottom: 40px;
            --controls-gap: 20px;
        }

        body.format-ipad {
            --container-max-width: 980px;
            --body-padding: 24px;
            --card-height: 430px;
            --card-padding: 44px;
            --front-font-size: 1.55em;
            --back-font-size: 1.25em;
            --header-title-size: 2.3em;
            --header-margin-bottom: 28px;
            --controls-gap: 18px;
        }

        body.format-iphone {
            --container-max-width: 430px;
            --body-padding: 14px;
            --card-height: 470px;
            --card-padding: 26px;
            --front-font-size: 1.15em;
            --back-font-size: 1em;
            --header-title-size: 1.65em;
            --header-margin-bottom: 22px;
            --controls-gap: 12px;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: var(--container-max-width);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: var(--header-margin-bottom);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: var(--header-title-size);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card-label {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.85em;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        .card-front .flip-hint::after {
            content: "Click to reveal answer";
        }

        .card-back .flip-hint::after {
            content: "Click for question";
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
        }

        body.format-iphone .header p {
            font-size: 0.95em;
        }

        body.format-iphone .progress-bar {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        body.format-iphone .card-label {
            font-size: 0.72em;
            top: 12px;
            right: 15px;
        }

        body.format-iphone .flip-hint {
            font-size: 0.75em;
            bottom: 12px;
        }

        body.format-iphone .controls {
            flex-direction: column;
            margin-bottom: 18px;
        }

        body.format-iphone .btn-primary,
        body.format-iphone .btn-secondary,
        body.format-iphone .counter {
            width: 100%;
        }

        body.format-iphone .btn {
            padding: 11px 18px;
            font-size: 0.9em;
        }

        body.format-iphone .card:hover {
            transform: none;
        }

        body.format-iphone .stats {
            grid-template-columns: 1fr;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--controls-gap);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }

        .completion-screen {
            text-align: center;
            color: white;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .completion-screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: var(--card-padding);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: var(--front-font-size);
            font-weight: 500;
            line-height: 1.6;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: var(--back-font-size);
            line-height: 1.7;
            transform: rotateY(180deg);
        }

        .card-content {
            max-height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        @media print {
            body {
                background: white;
            }

            .controls,
            .header,
            .completion-screen {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="format-iphone">
    <div class="container">
        <div class="header">
            <h1>Psychology: Research Methods</h1>
            <p>A Level Revision Flashcards</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="cardScreen">
            <div class="card-container">
                <div class="card" id="card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-content">
                                <div class="card-label">Question</div>
                                <div id="cardQuestion"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-label">Answer</div>
                                <div id="cardAnswer"></div>
                                <div class="flip-hint"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="prevBtn" onclick="previousCard()">← Previous</button>

                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>

                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next →</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetCards()">Start Over</button>
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 You've finished all cards!</h2>
            <p>Great work on your revision!</p>

            <div class="stats">
                <div class="stat-box">
                    <h3>Cards Reviewed</h3>
                    <div class="value" id="statsTotal">0</div>
                </div>

                <div class="stat-box">
                    <h3>Time Spent</h3>
                    <div class="value" id="statsTime">0m</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="goBackToCards()">Review Again</button>
                <button class="btn btn-secondary" onclick="downloadAsHTML()">Download Flashcards</button>
                <a href="./index.html" class="btn btn-secondary">← Back to Topics</a>
            </div>
        </div>
    </div>

    <script>
        const downloadFilename = "flashcards-psychology-research-methods-iphone.html";

        const flashcards = [
            {
                question: "What is a laboratory experiment?",
                answer: "A controlled research method conducted in an artificial environment where the researcher manipulates an independent variable and measures the dependent variable while controlling other variables. Allows for cause-and-effect conclusions but may lack ecological validity."
            },
            {
                question: "Define ecological validity.",
                answer: "The extent to which research findings can be generalised to real-world settings and everyday situations. Laboratory experiments often have low ecological validity because the artificial environment differs from natural contexts."
            },
            {
                question: "What is a field experiment?",
                answer: "A controlled study conducted in a natural, real-world setting where the researcher still manipulates the independent variable. Offers better ecological validity than laboratory experiments but less control over variables."
            },
            {
                question: "What are the advantages of a naturalistic observation?",
                answer: "High ecological validity as behaviour is observed in natural settings; non-intrusive method that doesn't alter behaviour; can generate rich, detailed qualitative data about real-world behaviour; useful for exploring new areas of research."
            },
            {
                question: "What are the disadvantages of naturalistic observation?",
                answer: "Low internal validity because variables cannot be controlled; observer bias may affect data collection; time-consuming and expensive; difficult to replicate; ethical concerns regarding consent; cannot establish cause-and-effect relationships."
            },
            {
                question: "What is a correlational study?",
                answer: "A research method that examines the relationship between two variables without manipulation. Produces correlation coefficients ranging from -1 (perfect negative) to +1 (perfect positive), but cannot establish causation."
            },
            {
                question: "Why cannot correlational studies establish causation?",
                answer: "Because the researcher does not manipulate variables; third variables may influence both variables; and the direction of causality cannot be determined. A strong correlation does not mean one variable causes the other."
            },
            {
                question: "What is a case study?",
                answer: "An in-depth investigation of a single individual, group, or event, often using multiple methods of data collection. Produces rich, detailed qualitative data but findings have low generalisability and may be affected by researcher bias."
            },
            {
                question: "What are strengths of case studies?",
                answer: "Generate detailed, rich data that can reveal complexity; useful for studying rare or unique cases; can challenge existing theories; provide insights into individual differences; high ecological validity."
            },
            {
                question: "What are weaknesses of case studies?",
                answer: "Low generalisability due to single subject; prone to researcher bias; time-consuming and expensive; may not be replicable; difficult to control variables; findings lack statistical validity."
            },
            {
                question: "What is a questionnaire?",
                answer: "A research method using a standardised set of written questions administered to participants to collect data about attitudes, behaviours, or beliefs. Can be self-completed or administered face-to-face, and produces quantitative or qualitative data."
            },
            {
                question: "What are advantages of questionnaires?",
                answer: "Cost-effective and quick to administer; can collect large amounts of data from many participants; standardised format allows easy comparison; can be distributed widely; anonymity encourages honest responses."
            },
            {
                question: "What are disadvantages of questionnaires?",
                answer: "Low response rates; may contain ambiguous or leading questions causing bias; participants may not be truthful; limited to information participants are willing to share; cannot clarify responses; may not capture complex thoughts."
            },
            {
                question: "What is an interview?",
                answer: "A face-to-face or phone-based data collection method where a researcher asks participants a series of questions. Can be structured (standardised questions), semi-structured (flexible questions), or unstructured (open conversation)."
            },
            {
                question: "What is a structured interview?",
                answer: "A standardised interview with identical questions asked to all participants in the same order. Produces quantitative data that is easy to compare and analyse but lacks flexibility and may not capture depth of experience."
            },
            {
                question: "What is a semi-structured interview?",
                answer: "An interview combining predetermined questions with flexibility to follow up and explore responses further. Allows researchers to obtain comparable data while capturing detailed, rich responses and participant perspectives."
            },
            {
                question: "What is sampling in research?",
                answer: "The process of selecting a subset of participants from a population to represent the whole. Used because studying entire populations is impractical; sampling method affects representativeness and generalisability of findings."
            },
            {
                question: "What is random sampling?",
                answer: "A sampling method where each member of the population has an equal chance of selection, typically using random number generators or lottery methods. Reduces sampling bias and produces representative samples."
            },
            {
                question: "What is stratified sampling?",
                answer: "A sampling method dividing the population into subgroups (strata) based on relevant characteristics, then randomly selecting from each stratum proportionally. Ensures representation of important population characteristics and reduces bias."
            },
            {
                question: "What is opportunity sampling?",
                answer: "A sampling method selecting participants who are readily available and willing to participate, also called convenience sampling. Quick and cost-effective but often produces biased, unrepresentative samples."
            },
            {
                question: "What is quantitative data?",
                answer: "Numerical data expressed as numbers and statistics. Can be analysed using statistical tests to identify patterns, relationships, and significance. Allows objective comparison but may oversimplify complex behaviour."
            },
            {
                question: "What is qualitative data?",
                answer: "Non-numerical data such as words, descriptions, or observations capturing richness and complexity. Analysed through coding and thematic analysis to identify patterns and meanings; more subjective than quantitative data."
            },
            {
                question: "What is validity in research?",
                answer: "The extent to which a study measures what it claims to measure and findings can be generalised. Internal validity refers to cause-and-effect conclusions; external validity refers to generalisability to other situations and populations."
            },
            {
                question: "What is reliability in research?",
                answer: "The consistency and repeatability of findings and measurements. A reliable measure produces similar results on repeated testing; reliable research should be replicable by other researchers producing similar findings."
            },
            {
                question: "What is a standardised procedure?",
                answer: "A detailed set of instructions ensuring consistent conditions across all participants in a study. Reduces variables affecting results and allows for replication, improving reliability."
            },
            {
                question: "What is demand characteristics?",
                answer: "Cues in the research environment that reveal the study's purpose or expected behaviour, causing participants to act unnaturally. Can reduce internal validity; minimised through deception or blind procedures."
            },
            {
                question: "What is social desirability bias?",
                answer: "The tendency for participants to present themselves in a socially acceptable way, giving answers they believe are desired rather than truthful responses. Particularly affects self-report methods like questionnaires and interviews."
            },
            {
                question: "What is informed consent?",
                answer: "An ethical principle where participants voluntarily agree to participate after receiving clear information about the study's aims, procedures, potential risks, and right to withdraw. Required by ethical guidelines to protect participants' rights."
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;
        let startTime = Date.now();

        function init() {
            if (flashcards.length === 0) {
                console.error("No flashcards loaded");
                return;
            }

            document.getElementById("totalCards").textContent = flashcards.length;
            displayCard();
        }

        function displayCard() {
            const card = flashcards[currentCardIndex];

            document.getElementById("cardQuestion").textContent = card.question;
            document.getElementById("cardAnswer").textContent = card.answer;
            document.getElementById("currentCard").textContent = currentCardIndex + 1;

            isFlipped = false;
            document.getElementById("card").classList.remove("flipped");

            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            document.getElementById("prevBtn").disabled = currentCardIndex === 0;

            document.getElementById("nextBtn").textContent =
                currentCardIndex === flashcards.length - 1 ? "Finish 🎉" : "Next →";
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                displayCard();
            } else {
                showCompletionScreen();
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function resetCards() {
            currentCardIndex = 0;
            startTime = Date.now();

            document.getElementById("cardScreen").style.display = "block";
            document.getElementById("completionScreen").classList.remove("show");

            displayCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }

            resetCards();
        }

        function goBackToCards() {
            resetCards();
        }

        function showCompletionScreen() {
            document.getElementById("cardScreen").style.display = "none";
            document.getElementById("completionScreen").classList.add("show");

            const timeSpent = Math.max(1, Math.round((Date.now() - startTime) / 60000));

            document.getElementById("statsTotal").textContent = flashcards.length;
            document.getElementById("statsTime").textContent = timeSpent + "m";
        }

        document.getElementById("card").addEventListener("click", function () {
            isFlipped = !isFlipped;
            this.classList.toggle("flipped");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextCard();
            }

            if (event.key === "ArrowLeft") {
                previousCard();
            }

            if (event.key === " ") {
                event.preventDefault();
                document.getElementById("card").click();
            }
        });

        function downloadAsHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = downloadFilename;
            link.click();

            URL.revokeObjectURL(url);
        }

        window.addEventListener("load", init);
    </script>
</body>
</html>
